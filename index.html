<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Gallery</title>
    <link rel="stylesheet" href="style.css"/>
</head>
<body>
    <header>
    <h1>Image Gallery</h1>
    <p>Explore Aesthetism</p>
    </header>
    <br>
    <br>
    <div class="gallery">
        <img src="images/Beach-Sunset.jpg" alt="Sunset at Beach"/>
        <img src="images/ocean-water.jpg" alt="ocean water"/>
        <img src="images/beach.jpg" alt="beach"/>
        <img src="images/waterfall.jpg" alt="waterfall"/>
        <img src="images/mountains.jpg" alt="mountain"/>
        <img src="images/snow-mountains.jpg" alt="snow mountain"/>
        <img src="images/bird.jpg" alt="bird"/>
        <img src="images/view.jpg" alt="view"/>
        <img src="images/bus.jpg" alt="bus"/>
        <img src="images/flower.jpg" alt="flower"/>
        <img src="images/house.jpg" alt="house"/>
        <img src="images/tiger.jpg" alt="tiger"/>
        <img src="images/lakes.jpg" alt="lakes"/>
        <img src="images/deer.jpg" alt="deer"/>
        <img src="images/forests.jpg" alt="forests"/>
    </div>
    <div class="lightbox">
        <span class="close">&times;</span>
        <button class="prev">&#10094;</button>
        <img class="lightbox-image">
        <button class="next">&#10095;</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
